<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./drill-manifest.json">
<title>영어 드릴</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e;
    --accent: #58a6ff; --green: #3fb950; --red: #f85149;
    --orange: #d29922; --gold: #f0c000; --purple: #bc8cff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 480px; margin: 0 auto; padding: 16px;
    min-height: 100dvh; -webkit-tap-highlight-color: transparent;
  }
  .header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:16px; }
  .header h1 { font-size:1.3em; }
  .header .streak { font-size:0.85em; color:var(--gold); font-weight:600; }
  .tabs { display:flex; gap:4px; margin-bottom:16px; background:var(--card); border-radius:8px; padding:4px; }
  .tab { flex:1; padding:8px; border-radius:6px; cursor:pointer; font-size:0.85em; font-weight:600; color:var(--text-dim); border:none; background:none; text-align:center; transition:all 0.2s; }
  .tab:hover { color:var(--text); }
  .tab.active { background:var(--accent); color:#fff; }
  .goal-bar { display:flex; align-items:center; gap:12px; margin-bottom:12px; padding:10px 16px; background:var(--card); border-radius:10px; border:1px solid var(--border); }
  .goal-bar .count { font-size:1.3em; font-weight:700; color:var(--accent); min-width:55px; }
  .goal-bar .bar-track { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .goal-bar .bar-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.4s ease; }
  .goal-bar.done .count { color:var(--green); }
  .goal-bar.done .bar-fill { background:var(--green); }
  .cat-badges { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .cat-badge { font-size:0.72em; padding:3px 9px; border-radius:10px; background:rgba(88,166,255,0.08); color:var(--text-dim); }
  .cat-badge.active { background:rgba(88,166,255,0.18); color:var(--accent); font-weight:600; }
  .card-area { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:16px; min-height:240px; }
  .card-type { font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .card-cat { font-size:0.75em; color:var(--accent); margin-bottom:16px; }
  .card-prompt { font-size:1.15em; line-height:1.7; margin-bottom:20px; word-break:keep-all; }
  .card-prompt .blank { border-bottom:2px dashed var(--accent); padding:0 6px; min-width:50px; display:inline-block; color:var(--accent); }
  .card-prompt .wrong { color:var(--red); text-decoration:line-through; }
  .card-prompt .korean { color:var(--text); }
  .card-rule { font-size:0.78em; color:var(--text-dim); margin-bottom:16px; padding:8px 12px; background:rgba(88,166,255,0.06); border-radius:8px; line-height:1.5; }
  .answer-row { display:flex; gap:8px; }
  .answer-input { flex:1; padding:12px 14px; border-radius:10px; border:2px solid var(--border); background:var(--bg); color:var(--text); font-size:1em; outline:none; transition:border-color 0.2s; }
  .answer-input:focus { border-color:var(--accent); }
  .answer-input.correct { border-color:var(--green); color:var(--green); }
  .answer-input.wrong { border-color:var(--red); }
  .answer-input::placeholder { color:var(--text-dim); opacity:0.5; }
  .submit-btn { padding:12px 18px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:0.9em; font-weight:600; cursor:pointer; white-space:nowrap; }
  .submit-btn:active { opacity:0.8; }
  .submit-btn:disabled { opacity:0.3; }
  .feedback { margin-top:16px; padding:14px; border-radius:10px; font-size:0.9em; line-height:1.6; }
  .feedback.correct-fb { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); }
  .feedback.wrong-fb { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); }
  .feedback .fb-label { font-weight:700; margin-bottom:4px; }
  .feedback .fb-answer { margin-top:6px; color:var(--green); }
  .feedback .fb-hint { color:var(--text-dim); margin-top:6px; font-size:0.85em; }
  .next-btn { margin-top:12px; padding:12px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:0.95em; font-weight:600; cursor:pointer; width:100%; }
  .next-btn:active { opacity:0.8; }
  .celebration { text-align:center; padding:32px 20px; }
  .celebration .emoji { font-size:3em; margin-bottom:12px; }
  .celebration .title { font-size:1.3em; font-weight:700; margin-bottom:8px; }
  .celebration .score { font-size:2.2em; font-weight:700; margin:12px 0; }
  .celebration .detail { color:var(--text-dim); font-size:0.9em; }
  .celebration .retry-btn { margin-top:24px; padding:12px 32px; border-radius:10px; border:1px solid var(--border); background:none; color:var(--text); font-size:0.9em; cursor:pointer; }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-dim); }
  .empty-state .emoji { font-size:2em; margin-bottom:12px; }
  .empty-state p { font-size:0.9em; line-height:1.5; }
  .reset-btn { display:block; margin:20px auto; padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text-dim); font-size:0.8em; cursor:pointer; }
  .reset-btn:hover { border-color:var(--red); color:var(--red); }
  @media(max-width:360px){ body{padding:10px;} .card-prompt{font-size:1em;} }
</style>
</head>
<body>
<div class="header">
  <h1>오늘의 드릴</h1>
  <div class="streak" id="streak"></div>
</div>
<div class="tabs" id="lang-tabs">
  <button class="tab active" onclick="switchLang('english')">English</button>
  <button class="tab" onclick="switchLang('japanese')">日本語</button>
</div>
<div class="goal-bar" id="goal-bar">
  <div class="count" id="goal-count">0/15</div>
  <div class="bar-track"><div class="bar-fill" id="goal-fill" style="width:0%"></div></div>
</div>
<div class="cat-badges" id="cat-badges"></div>
<div class="card-area" id="card-area"></div>
<button class="reset-btn" onclick="resetProgress()">학습 기록 초기화</button>
<script>
// ============================================================
// 드릴 데이터 — 수업 분석 시 Claude가 업데이트합니다
// ============================================================
const DRILL_DATA = {

          { type: "fix", wrong: "a lot of fun movie", correct: "a lot of fun movies", distractors: ["a lot of fun a movie", "a lot of the fun movie"], hint: "a lot of + 복수명사", source: "3/3" },

          { type: "fix", wrong: "My place is near subway station.", correct: "My place is near a subway station.", distractors: ["My place is near the subway station.", "My place is near subway stations."], hint: "셀 수 있는 단수 명사 → 관사 a 필수", source: "3/16" },

          { type: "fix", wrong: "I transferred to boat.", correct: "I transferred to a boat.", distractors: ["I transferred to the boat.", "I transferred boat."], hint: "셀 수 있는 단수 명사 → 관사 a 필수", source: "3/20" },

          { type: "fix", wrong: "there are peoples that have shopping bags", correct: "There are people who have shopping bags.", distractors: ["There are peoples who have shopping bags.", "There are people that has shopping bags."], hint: "people은 이미 복수 (peoples X) + 사람 → who", source: "3/24" }

      {

          { type: "fix", wrong: "someone who lies me", correct: "someone who lies to me", distractors: ["someone who lies at me", "someone who lies for me"], hint: "lie + to + 사람", source: "3/13" },
          { type: "fix", wrong: "I tried to go appointment.", correct: "I tried to go to an appointment.", distractors: ["I tried to go an appointment.", "I tried to go at appointment."], hint: "go to + 장소, 단수 → an appointment", source: "3/13" },
          { type: "translate", korean: "나에게 거짓말하는 사람은 싫어.", answer: "I don't like someone who lies to me.", distractors: ["I don't like someone who lies me.", "I don't like someone who lie to me."], hint: "lie + to + 사람" },
          { type: "fix", wrong: "I stay at the park in the weekend.", correct: "I stay at the park on the weekend.", distractors: ["I stay at the park at the weekend.", "I stay at the park by the weekend."], hint: "주말/요일 = on (in X)", source: "3/16" },
          { type: "fix", wrong: "I just send our my exercise teacher.", correct: "I just send them to my exercise teacher.", distractors: ["I just send my exercise teacher.", "I just send for my exercise teacher."], hint: "send + 목적어 + to + 사람", source: "3/16" },

      {

        name: "주어-동사 수일치",

        rule: "단수 주어 → 동사+s / 복수 주어 → 동사원형",

// 저장소 키
// ============================================================
const SRS_KEY = 'drill-srs-v2';
const STATS_KEY = 'drill-stats-v2';
const ERRORS_KEY = 'drill-cat-errors-v1';
const SRS_INTERVALS = [0, 1, 3, 7, 14];

function loadSRS() { try { return JSON.parse(localStorage.getItem(SRS_KEY)) || {}; } catch { return {}; } }
function saveSRS(d) { localStorage.setItem(SRS_KEY, JSON.stringify(d)); }
function loadStats() { try { return JSON.parse(localStorage.getItem(STATS_KEY)) || { streak:0, lastDate:null, totalReviewed:0 }; } catch { return { streak:0, lastDate:null, totalReviewed:0 }; } }
function saveStats(d) { localStorage.setItem(STATS_KEY, JSON.stringify(d)); }
function loadCatErrors() { try { return JSON.parse(localStorage.getItem(ERRORS_KEY)) || {}; } catch { return {}; } }
function saveCatErrors(d) { localStorage.setItem(ERRORS_KEY, JSON.stringify(d)); }

function getToday() { return new Date().toISOString().slice(0,10); }
function daysBetween(a,b) { return Math.floor((new Date(b)-new Date(a))/86400000); }
function getCardId(catId,idx) { return catId+':'+idx; }
function getCardState(srs,cid) { return srs[cid] || { level:0, lastReview:null }; }

// ============================================================
// Top 3 취약 카테고리 선정
// ============================================================
function getTopCategories(lang, n) {
  n = n || 3;
  const errors = loadCatErrors();
  const cats = DRILL_DATA[lang]?.categories || [];
  const srs = loadSRS();

  const scored = cats.map(cat => {
    // 누적 오답 횟수
    const errCount = errors[cat.id] || 0;
    // 현재 레벨 0인 카드 수 (리셋된 것 = 틀린 것)
    let resetCount = 0;
    cat.cards.forEach((_, idx) => {
      const s = getCardState(srs, getCardId(cat.id, idx));
      if (s.lastReview && s.level === 0) resetCount++;
    });
    // severity 보너스
    const sevBonus = cat.severity === 'high' ? 10 : 0;
    return { cat, score: errCount + resetCount * 3 + sevBonus };
  });

  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, n).map(s => s.cat);
}

// ============================================================
// 일일 카드 선정: 카테고리당 5장
// ============================================================
function getDailyCards(lang) {
  const topCats = getTopCategories(lang, 3);
  const srs = loadSRS();
  const cards = [];

  topCats.forEach(cat => {
    const catCards = cat.cards.map((card, idx) => ({
      card, cat,
      cardId: getCardId(cat.id, idx),
      state: getCardState(srs, getCardId(cat.id, idx))
    }));
    // 가장 약한 카드 우선 (레벨 낮은 순 → 미학습 → 나머지)
    catCards.sort((a,b) => {
      if (!a.state.lastReview && b.state.lastReview) return 1;
      if (a.state.lastReview && !b.state.lastReview) return -1;
      return a.state.level - b.state.level;
    });
    cards.push(...catCards.slice(0, 5));
  });

  // 카테고리 섞되 같은 카테고리 연속 방지
  const shuffled = [];
  const buckets = {};
  cards.forEach(c => {
    const k = c.cat.id;
    if (!buckets[k]) buckets[k] = [];
    buckets[k].push(c);
  });
  const keys = Object.keys(buckets);
  let round = 0;
  while (shuffled.length < cards.length && round < 20) {
    keys.forEach(k => {
      if (buckets[k].length > 0) shuffled.push(buckets[k].shift());
    });
    round++;
  }
  return shuffled;
}

// ============================================================
// 정답 체크
// ============================================================
function normalize(s) {
  return s.toLowerCase()
    .replace(/\([^)]*\)/g, '')   // 괄호+읽기 제거: 原価(げんか) → 原価
    .replace(/（[^）]*）/g, '')   // 全角괄호도 제거
    .replace(/[.,!?;:'"。、！？「」『』\u3000]/g, '')
    .replace(/\s+/g, ' ').trim();
}

function checkAnswer(input, correct) {
  const ni = normalize(input);
  const answers = Array.isArray(correct) ? correct : [correct];
  return answers.some(a => ni === normalize(a));
}

function getCorrectDisplay(correct) {
  return Array.isArray(correct) ? correct[0] : correct;
}

  document.querySelectorAll('#lang-tabs .tab').forEach(t => {
    if ((lang==='english' && t.textContent==='English') ||
        (lang==='japanese' && t.textContent==='日本語')) t.classList.add('active');
  });
  startSession();
}

function startSession() {
  topCats = getTopCategories(currentLang, 3);
  queue = getDailyCards(currentLang);
  queueIndex = 0;
  sessionCorrect = 0;
  answered = false;
  wrongLog = [];
  renderStreak();
  renderCatBadges();
  renderGoal();
  renderCard();
}

function renderStreak() {
  const stats = loadStats();
  const s = stats.streak || 0;
  document.getElementById('streak').textContent = s > 0 ? s + '일 연속' : '';
}

function renderCatBadges() {
  const el = document.getElementById('cat-badges');
  el.innerHTML = topCats.map((cat, i) => {
    const current = queueIndex < queue.length ? queue[queueIndex].cat.id : '';
    const active = cat.id === current ? ' active' : '';
    return `<span class="cat-badge${active}">${cat.name}</span>`;
  }).join('');
}

function renderGoal() {
  const done = Math.min(queueIndex, queue.length);
  const total = queue.length || 15;
  const pct = Math.round(done / total * 100);
  document.getElementById('goal-count').textContent = done + '/' + total;
  document.getElementById('goal-fill').style.width = pct + '%';
  const bar = document.getElementById('goal-bar');
  if (done >= total) bar.classList.add('done');
  else bar.classList.remove('done');
}

function renderCard() {
  renderGoal();
  renderCatBadges();
  const area = document.getElementById('card-area');

  if (queue.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>카드가 없습니다.<br>수업 후 자동으로 추가됩니다.</p></div>';
    return;
  }

  if (queueIndex >= queue.length) {
    const pct = queue.length > 0 ? Math.round(sessionCorrect / queue.length * 100) : 0;
    const emoji = pct >= 80 ? '🔥' : pct >= 50 ? '👍' : '💪';
    const msg = pct >= 80 ? '완벽에 가까워요!' : pct >= 50 ? '좋은 연습이었어요' : '틀린 문제 위주로 다시 해봐요';
    const promptBlock = wrongLog.length > 0 ? `
      <div style="margin-top:20px;text-align:left">
        <button class="retry-btn" style="margin:0 0 10px;width:100%" onclick="copyPrompt()">📋 틀린 문제 피드백 복사</button>
        <div id="copy-msg" style="font-size:0.8em;color:var(--green);text-align:center;display:none">복사됨!</div>
      </div>` : '';
    area.innerHTML = `<div class="celebration">
      <div class="emoji">${emoji}</div>
      <div class="title">오늘의 드릴 완료</div>
      <div class="score" style="color:${pct>=50?'var(--green)':'var(--orange)'}">${pct}%</div>
      <div class="detail">${sessionCorrect}/${queue.length} 정답 · ${msg}</div>${promptBlock}
      <button class="retry-btn" onclick="startSession()">다시 도전</button>
    </div>`;

    // 스트릭 업데이트
    const stats = loadStats();
    const today = getToday();
    if (stats.lastDate !== today) {
      if (stats.lastDate && daysBetween(stats.lastDate, today) === 1) stats.streak = (stats.streak||0)+1;
      else if (!stats.lastDate || daysBetween(stats.lastDate, today) > 1) stats.streak = 1;
      stats.lastDate = today;
      saveStats(stats);
      renderStreak();
    }
    return;
  }

  const { card, cat } = queue[queueIndex];
  answered = false;

  const typeLabel = card.type === 'fill' ? '빈칸 채우기' : card.type === 'fix' ? '문장 고치기' : '번역하기';
  let promptHtml = '';
  let placeholder = '';

  if (card.type === 'fill') {
    promptHtml = card.sentence.replace('_____', '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
    if (card.korean) promptHtml += '<div style="margin-top:10px;font-size:0.85em;color:var(--text-dim)">' + card.korean + '</div>';
    placeholder = '빈칸에 들어갈 답을 입력';
  } else if (card.type === 'fix') {
    promptHtml = '<span class="wrong">' + card.wrong + '</span>';
    if (card.korean) promptHtml += '<div style="margin-top:10px;font-size:0.85em;color:var(--text-dim)">' + card.korean + '</div>';
    else promptHtml += '<div style="margin-top:10px;font-size:0.85em;color:var(--text-dim)">→ ' + card.hint + '</div>';
    placeholder = '올바른 문장을 입력';
  } else {
    promptHtml = '<span class="korean">' + card.korean + '</span>';
    placeholder = currentLang === 'english' ? 'English로 번역' : '日本語で翻訳';
  }

  area.innerHTML = `
    <div class="card-type">${typeLabel}</div>
    <div class="card-cat">${cat.name}</div>
    <div class="card-prompt">${promptHtml}</div>
    <div class="card-rule">${cat.rule}</div>
    <div class="answer-row">
      <input class="answer-input" id="answer-input" type="text" placeholder="${placeholder}" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">확인</button>
    </div>
    <div id="feedback-slot"></div>`;

  const input = document.getElementById('answer-input');
  setTimeout(() => input.focus(), 100);
}

function submitAnswer() {
  if (answered) return;
  const input = document.getElementById('answer-input');
  const val = input.value.trim();
  if (!val) return;

  answered = true;
  const { card, cat, cardId } = queue[queueIndex];
  const correctVal = card.type === 'fill' ? card.answer : (card.correct || card.answer);
  const isCorrect = checkAnswer(val, correctVal);

  if (isCorrect) sessionCorrect++;

  // SRS 업데이트
  const srs = loadSRS();
  const state = getCardState(srs, cardId);
  if (isCorrect) { state.level = Math.min(state.level+1, SRS_INTERVALS.length); }
  else { state.level = 0; }
  state.lastReview = getToday();
  srs[cardId] = state;
  saveSRS(srs);

  // 카테고리 오답 추적 + 오답 로그
  if (!isCorrect) {
    const errs = loadCatErrors();
    errs[cat.id] = (errs[cat.id]||0) + 1;
    saveCatErrors(errs);
    wrongLog.push({ cat: cat.name, type: card.type, myAnswer: val, correct: getCorrectDisplay(correctVal), hint: card.hint, question: card.type === 'fill' ? card.sentence : card.type === 'fix' ? card.wrong : card.korean });
  }

  // 통계
  const stats = loadStats();
  stats.totalReviewed = (stats.totalReviewed||0) + 1;
  saveStats(stats);

  // UI 피드백
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  document.getElementById('submit-btn').disabled = true;

  const display = getCorrectDisplay(correctVal);
  const slot = document.getElementById('feedback-slot');
  slot.innerHTML = `
    <div class="feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
      <div class="fb-label">${isCorrect ? '✓ 정답!' : '✗ 오답'}</div>
      ${!isCorrect ? '<div class="fb-answer">→ ' + display + '</div>' : ''}
      <div class="fb-hint">${card.hint}</div>
    </div>
    <button class="next-btn" onclick="nextCard()">다음 →</button>`;
}

function copyPrompt() {
  const lang = currentLang === 'english' ? '영어' : '일본어';
  let text = `${lang} 드릴에서 틀린 문제 ${wrongLog.length}개야. 각각 왜 틀렸는지 짧게 설명해주고, 비슷한 패턴으로 연습 문제 3개만 내줘.\n\n`;
  wrongLog.forEach((w, i) => {
    text += `${i+1}. [${w.cat}] `;
    if (w.type === 'fill') text += `빈칸: ${w.question}\n`;
    else if (w.type === 'fix') text += `교정: ${w.question}\n`;
    else text += `번역: ${w.question}\n`;
    text += `   내 답: ${w.myAnswer}\n   정답: ${w.correct}\n   힌트: ${w.hint}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copy-msg');
    if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 2000); }
  });
}

function nextCard() {
  queueIndex++;
  renderCard();
}

function resetProgress() {
  if (confirm('학습 기록을 모두 초기화할까요?')) {
    localStorage.removeItem(SRS_KEY);
    localStorage.removeItem(STATS_KEY);
    localStorage.removeItem(ERRORS_KEY);
    startSession();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) {
    if (answered) { e.preventDefault(); nextCard(); }
    else if (document.activeElement === document.getElementById('answer-input')) { e.preventDefault(); submitAnswer(); }
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./drill-sw.js').catch(() => {});
}

startSession();
</script></body></html>
