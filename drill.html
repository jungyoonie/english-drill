<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./drill-manifest.json">
<title>오늘의 드릴</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e;
    --accent: #58a6ff; --green: #3fb950; --red: #f85149;
    --orange: #d29922; --gold: #f0c000;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); max-width:480px; margin:0 auto; padding:16px; min-height:100dvh; -webkit-tap-highlight-color:transparent; }
  .header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:16px; }
  .header h1 { font-size:1.3em; }
  .header .streak { font-size:0.85em; color:var(--gold); font-weight:600; }
  .tabs { display:flex; gap:4px; margin-bottom:16px; background:var(--card); border-radius:8px; padding:4px; }
  .tab { flex:1; padding:8px; border-radius:6px; cursor:pointer; font-size:0.85em; font-weight:600; color:var(--text-dim); border:none; background:none; text-align:center; transition:all 0.2s; }
  .tab:hover { color:var(--text); }
  .tab.active { background:var(--accent); color:#fff; }
  .goal-bar { display:flex; align-items:center; gap:12px; margin-bottom:16px; padding:10px 16px; background:var(--card); border-radius:10px; border:1px solid var(--border); }
  .goal-bar .count { font-size:1.3em; font-weight:700; color:var(--accent); min-width:55px; }
  .goal-bar .bar-track { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .goal-bar .bar-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.4s ease; }
  .goal-bar.done .count { color:var(--green); }
  .goal-bar.done .bar-fill { background:var(--green); }
  .card-area { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:16px; min-height:220px; }
  .card-cat { font-size:0.75em; color:var(--accent); margin-bottom:16px; }
  .card-prompt { font-size:1.15em; line-height:1.7; margin-bottom:20px; word-break:keep-all; }
  .answer-row { display:flex; gap:8px; }
  .answer-input { flex:1; padding:12px 14px; border-radius:10px; border:2px solid var(--border); background:var(--bg); color:var(--text); font-size:1em; outline:none; transition:border-color 0.2s; }
  .answer-input:focus { border-color:var(--accent); }
  .answer-input.correct { border-color:var(--green); color:var(--green); }
  .answer-input.wrong { border-color:var(--red); }
  .answer-input::placeholder { color:var(--text-dim); opacity:0.5; }
  .submit-btn { padding:12px 18px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:0.9em; font-weight:600; cursor:pointer; white-space:nowrap; }
  .submit-btn:active { opacity:0.8; }
  .submit-btn:disabled { opacity:0.3; }
  .feedback { margin-top:16px; padding:14px; border-radius:10px; font-size:0.9em; line-height:1.6; }
  .feedback.correct-fb { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); }
  .feedback.wrong-fb { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); }
  .feedback .fb-label { font-weight:700; margin-bottom:4px; }
  .feedback .fb-answer { margin-top:6px; color:var(--green); }
  .feedback .fb-hint { color:var(--text-dim); margin-top:6px; font-size:0.85em; }
  .next-btn { margin-top:12px; padding:12px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:0.95em; font-weight:600; cursor:pointer; width:100%; }
  .next-btn:active { opacity:0.8; }
  .celebration { text-align:center; padding:32px 20px; }
  .celebration .emoji { font-size:3em; margin-bottom:12px; }
  .celebration .title { font-size:1.3em; font-weight:700; margin-bottom:8px; }
  .celebration .score { font-size:2.2em; font-weight:700; margin:12px 0; }
  .celebration .detail { color:var(--text-dim); font-size:0.9em; }
  .celebration .retry-btn { margin-top:24px; padding:12px 32px; border-radius:10px; border:1px solid var(--border); background:none; color:var(--text); font-size:0.9em; cursor:pointer; }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-dim); }
  .reset-btn { display:block; margin:20px auto; padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text-dim); font-size:0.8em; cursor:pointer; }
  .reset-btn:hover { border-color:var(--red); color:var(--red); }
</style>
</head>
<body>
<div class="header">
  <h1>오늘의 드릴</h1>
  <div class="streak" id="streak"></div>
</div>
<div class="tabs" id="lang-tabs">
  <button class="tab active" onclick="switchLang('en')">English</button>

</div>

  <div class="count" id="goal-count">0/15</div>
  <div class="bar-track"><div class="bar-fill" id="goal-fill" style="width:0%"></div></div>

<div class="card-area" id="card-area"></div>
<button class="reset-btn" onclick="resetProgress()">학습 기록 초기화</button>

<script>

// ============================================================
// 저장소
// ============================================================
const SRS_KEY = 'drill-srs-v4';
const STATS_KEY = 'drill-stats-v4';
const SRS_INTERVALS = [0, 1, 3, 7, 14];

function load(k,d) { try { return JSON.parse(localStorage.getItem(k))||d; } catch { return d; } }
function save(k,v) { localStorage.setItem(k, JSON.stringify(v)); }
function getToday() { return new Date().toISOString().slice(0,10); }
function daysBetween(a,b) { return Math.floor((new Date(b)-new Date(a))/86400000); }

function normalize(s) {
  return s.toLowerCase()
    .replace(/\([^)]*\)/g, '').replace(/（[^）]*）/g, '')
    .replace(/[.,!?;:'"。、！？「」『』\u3000]/g, '')
    .replace(/\s+/g, ' ').trim();
}

// ============================================================
// 카드 선정: SRS 기반 15장
// ============================================================
function getDailyCards(lang) {
  const cards = DRILL_DATA[lang] || [];
  const srs = load(SRS_KEY, {});
  const today = getToday();
  const due = [];
  const rest = [];

  cards.forEach((card, idx) => {
    const id = lang + ':' + idx;
    const state = srs[id] || { level: 0, lastReview: null };
    const item = { card, id, state, idx };

    if (state.level >= SRS_INTERVALS.length) return; // 마스터
    if (!state.lastReview) { due.push(item); return; }
    const interval = SRS_INTERVALS[state.level];
    if (daysBetween(state.lastReview, today) >= interval) due.push(item);
    else rest.push(item);
  });

  // 약한 카드 우선 (레벨 낮은 순)
  due.sort((a,b) => a.state.level - b.state.level);
  // 15장 부족하면 rest에서 보충
  const pool = [...due, ...rest].slice(0, 15);
  // 셔플
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  return pool;
}

// ============================================================
// 앱 상태
// ============================================================
let lang = 'en';
let queue = [];
let qi = 0;
let correct = 0;
let answered = false;
let wrongLog = [];

// ============================================================
// UI
// ============================================================
function switchLang(l) {
  lang = l;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if ((l==='en' && t.textContent==='English')||(l==='ja' && t.textContent==='日本語')) t.classList.add('active');
  });
  startSession();
}

function startSession() {
  queue = getDailyCards(lang);
  qi = 0; correct = 0; answered = false; wrongLog = [];
  renderStreak(); renderGoal(); renderCard();
}

function renderStreak() {
  const s = load(STATS_KEY, {}).streak || 0;
  document.getElementById('streak').textContent = s > 0 ? s+'일 연속' : '';
}

function renderGoal() {
  const done = Math.min(qi, queue.length), total = queue.length || 15;
  document.getElementById('goal-count').textContent = done+'/'+total;
  document.getElementById('goal-fill').style.width = Math.round(done/total*100)+'%';
  const bar = document.getElementById('goal-bar');
  done >= total ? bar.classList.add('done') : bar.classList.remove('done');
}

function renderCard() {
  renderGoal();
  const area = document.getElementById('card-area');

  if (!queue.length) {
    area.innerHTML = '<div class="empty-state">📭<br>카드가 없습니다.</div>';
    return;
  }

  if (qi >= queue.length) {
    const pct = Math.round(correct/queue.length*100);
    const emoji = pct>=80?'🔥':pct>=50?'👍':'💪';
    const promptBtn = wrongLog.length ? `<button class="retry-btn" style="margin-top:16px;width:100%" onclick="copyPrompt()">📋 틀린 문제 피드백 복사</button><div id="copy-msg" style="font-size:0.8em;color:var(--green);text-align:center;display:none;margin-top:4px">복사됨!</div>` : '';
    area.innerHTML = `<div class="celebration">
      <div class="emoji">${emoji}</div>
      <div class="title">오늘의 드릴 완료</div>
      <div class="score" style="color:${pct>=50?'var(--green)':'var(--orange)'}">${pct}%</div>
      <div class="detail">${correct}/${queue.length} 정답</div>
      ${promptBtn}
      <button class="retry-btn" style="margin-top:12px" onclick="startSession()">다시 도전</button>
    </div>`;
    // 스트릭
    const stats = load(STATS_KEY, { streak:0, lastDate:null });
    const today = getToday();
    if (stats.lastDate !== today) {
      stats.streak = (stats.lastDate && daysBetween(stats.lastDate,today)===1) ? (stats.streak||0)+1 : 1;
      stats.lastDate = today;
      save(STATS_KEY, stats);
      renderStreak();
    }
    return;
  }

  const { card } = queue[qi];
  answered = false;
  const placeholder = lang==='en' ? 'English로 번역' : '日本語で翻訳';

  area.innerHTML = `
    <div class="card-cat">${card.cat}</div>
    <div class="card-prompt">${card.korean}</div>
    <div class="answer-row">
      <input class="answer-input" id="ai" type="text" placeholder="${placeholder}" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button class="submit-btn" id="sb" onclick="submit()">확인</button>
    </div>
    <div id="fb"></div>`;
  setTimeout(() => document.getElementById('ai').focus(), 100);
}

function submit() {
  if (answered) return;
  const input = document.getElementById('ai');
  const val = input.value.trim();
  if (!val) return;
  answered = true;

  const { card, id } = queue[qi];
  const answers = Array.isArray(card.answer) ? card.answer : [card.answer];
  const ni = normalize(val);
  const ok = answers.some(a => ni === normalize(a));
  if (ok) correct++;

  // SRS
  const srs = load(SRS_KEY, {});
  const state = srs[id] || { level:0, lastReview:null };
  state.level = ok ? Math.min(state.level+1, SRS_INTERVALS.length) : 0;
  state.lastReview = getToday();
  srs[id] = state;
  save(SRS_KEY, srs);

  if (!ok) wrongLog.push({ cat: card.cat, korean: card.korean, myAnswer: val, correct: answers[0], hint: card.hint });

  input.classList.add(ok?'correct':'wrong');
  input.disabled = true;
  document.getElementById('sb').disabled = true;

  document.getElementById('fb').innerHTML = `
    <div class="feedback ${ok?'correct-fb':'wrong-fb'}">
      <div class="fb-label">${ok?'✓ 정답!':'✗ 오답'}</div>
      ${!ok?'<div class="fb-answer">→ '+answers[0]+'</div>':''}
      <div class="fb-hint">${card.hint}</div>
    </div>
    <button class="next-btn" onclick="next()">다음 →</button>`;
}

function next() { qi++; renderCard(); }

function copyPrompt() {
  const l = lang==='en'?'영어':'일본어';
  let t = l+' 드릴에서 틀린 문제 '+wrongLog.length+'개야. 각각 왜 틀렸는지 짧게 설명해주고, 비슷한 패턴으로 연습 문제 3개만 내줘.\n\n';
  wrongLog.forEach((w,i) => {
    t += (i+1)+'. ['+w.cat+'] '+w.korean+'\n   내 답: '+w.myAnswer+'\n   정답: '+w.correct+'\n   힌트: '+w.hint+'\n\n';
  });
  navigator.clipboard.writeText(t).then(() => {
    const m = document.getElementById('copy-msg');
    if(m){m.style.display='block';setTimeout(()=>m.style.display='none',2000);}
  });
}

function resetProgress() {
  if (confirm('학습 기록을 모두 초기화할까요?')) {
    localStorage.removeItem(SRS_KEY);
    localStorage.removeItem(STATS_KEY);
    startSession();
  }
}

// 글로벌 Enter 키
document.addEventListener('keydown', function(e) {
  if (e.key==='Enter' && !e.isComposing && e.keyCode!==229) {
    if (answered) { e.preventDefault(); next(); }
    else if (document.activeElement===document.getElementById('ai')) { e.preventDefault(); submit(); }
  }
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./drill-sw.js').catch(()=>{});
startSession();
</script>
</body>
</html>
