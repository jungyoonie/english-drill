<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어학 학습 대시보드</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --blue: #58a6ff;
    --gold: #f0c000;
    --red: #f85149;
    --orange: #d29922;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 { font-size: 1.6em; margin-bottom: 16px; }
  h2 { font-size: 1.1em; color: var(--text-dim); margin-bottom: 12px; font-weight: 500; }

  /* 탭 */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--card);
    border-radius: 8px;
    padding: 4px;
    width: fit-content;
  }
  .tab {
    padding: 8px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.95em;
    font-weight: 600;
    color: var(--text-dim);
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  /* 요약 카드 */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .summary-card .value {
    font-size: 2em;
    font-weight: 700;
    line-height: 1.2;
  }
  .summary-card .label {
    font-size: 0.8em;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* 캘린더 */
  .calendar-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .calendar-nav {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .calendar-nav button {
    background: var(--border);
    border: none;
    color: var(--text);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85em;
  }
  .calendar-nav button:hover { background: var(--accent); }
  .calendar-nav span { font-size: 0.9em; min-width: 100px; text-align: center; }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day-label {
    font-size: 0.7em;
    color: var(--text-dim);
    text-align: center;
    padding: 4px;
  }
  .cal-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75em;
    color: var(--text-dim);
    background: rgba(255,255,255,0.03);
    position: relative;
  }
  .cal-cell.empty { background: none; }
  .cal-cell.lesson { background: var(--green); color: #fff; font-weight: 600; }
  .cal-cell.exercise { background: var(--blue); color: #fff; font-weight: 600; }
  .cal-cell.both { background: var(--gold); color: #000; font-weight: 600; }
  .cal-cell.today { outline: 2px solid var(--accent); outline-offset: -1px; }
  .cal-legend {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-size: 0.8em;
    color: var(--text-dim);
  }
  .cal-legend span::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .cal-legend .leg-lesson::before { background: var(--green); }
  .cal-legend .leg-exercise::before { background: var(--blue); }
  .cal-legend .leg-both::before { background: var(--gold); }

  /* 차트 섹션 */
  .chart-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
  }

  /* 실수 패턴 바 차트 */
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bar-label {
    font-size: 0.8em;
    width: 140px;
    text-align: right;
    flex-shrink: 0;
    color: var(--text-dim);
  }
  .bar-track {
    flex: 1;
    height: 22px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-size: 0.75em;
    font-weight: 600;
    color: #fff;
    transition: width 0.5s ease;
  }
  .bar-fill.high { background: var(--red); }
  .bar-fill.mid { background: var(--orange); }

  /* 연습문제 스택 바 */
  .stack-chart {
    display: flex;
    align-items: flex-end;
    gap: 24px;
    height: 160px;
    padding: 0 20px;
    justify-content: center;
  }
  .stack-col {
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 0;
    flex: 0 0 80px;
  }
  .stack-segment {
    width: 60px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75em;
    font-weight: 600;
    color: #fff;
    min-height: 2px;
  }
  .stack-segment.correct { background: var(--green); }
  .stack-segment.almost { background: var(--orange); }
  .stack-segment.wrong { background: var(--red); }
  .stack-label {
    margin-top: 6px;
    font-size: 0.75em;
    color: var(--text-dim);
  }
  .stack-legend {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-size: 0.8em;
    color: var(--text-dim);
    justify-content: center;
  }
  .stack-legend span::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .stack-legend .leg-correct::before { background: var(--green); }
  .stack-legend .leg-almost::before { background: var(--orange); }
  .stack-legend .leg-wrong::before { background: var(--red); }

  /* 피드백 */
  .feedback-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .feedback-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9em;
  }
  .feedback-item:last-child { border-bottom: none; }
  .feedback-date {
    font-size: 0.8em;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .feedback-text { color: var(--text-dim); line-height: 1.5; }

  .hidden { display: none; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .bar-label { width: 100px; font-size: 0.7em; }
  }
</style>
</head>

let currentTab = 'english';
let calendarMonth = new Date(2026, 2, 1); // 2026-03

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if ((tab === 'english' && t.textContent === 'English') ||
        (tab === 'japanese' && t.textContent === '日本語')) {
      t.classList.add('active');
    }
  });
  render();
}

function render() {
  const data = STUDY_DATA[currentTab];
  const today = new Date(2026, 2, 24);
  const container = document.getElementById('dashboard-content');

  // 통계 계산
  const totalLessons = data.lessons.length;
  const avgScore = data.exercises.length > 0
    ? Math.round(data.exercises.reduce((s, e) => s + (e.score / e.total * 100), 0) / data.exercises.length)
    : 0;

  const currentMonth = today.getMonth();
  const currentYear = today.getFullYear();
  const thisMonthDays = new Set();
  data.lessons.forEach(l => {
    const d = new Date(l.date);
    if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) thisMonthDays.add(l.date);
  });
  data.exercises.forEach(e => {
    const d = new Date(e.date);
    if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) thisMonthDays.add(e.date);
  });

  // streak 계산 (주말은 자동 스킵 — 평일만 카운트)
  const allDates = new Set([
    ...data.lessons.map(l => l.date),
    ...data.exercises.map(e => e.date)
  ]);
  let streak = 0;
  let checkDate = new Date(today);
  while (true) {
    const dow = checkDate.getDay(); // 0=일, 6=토
    if (dow === 0 || dow === 6) {
      checkDate.setDate(checkDate.getDate() - 1);
      continue;
    }
    const ds = checkDate.toISOString().slice(0, 10);
    if (allDates.has(ds)) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      break;
    }
  }

  // 실수 패턴 최대값
  const maxCount = Math.max(...data.errorPatterns.map(e => e.count), 1);

  container.innerHTML = `
    <!-- 요약 카드 -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="value">${totalLessons}</div>
        <div class="label">총 수업 횟수</div>
      </div>
      <div class="summary-card">
        <div class="value">${data.exercises.length > 0 ? avgScore + '%' : '-'}</div>
        <div class="label">연습문제 평균</div>
      </div>
      <div class="summary-card">
        <div class="value">${thisMonthDays.size}</div>
        <div class="label">이번 달 학습일</div>
      </div>
      <div class="summary-card">
        <div class="value" style="color: ${streak > 0 ? 'var(--gold)' : 'var(--text)'}">${streak}일</div>
        <div class="label">연속 streak</div>
      </div>
    </div>

    <!-- 출석 캘린더 -->
    <div class="calendar-section">
      <div class="calendar-header">
        <h2>출석 캘린더</h2>
        <div class="calendar-nav">
          <button onclick="navMonth(-1)">◀</button>
          <span id="cal-month-label"></span>
          <button onclick="navMonth(1)">▶</button>
        </div>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
      <div class="cal-legend">
        <span class="leg-lesson">수업</span>
        <span class="leg-exercise">연습</span>
        <span class="leg-both">둘 다</span>
      </div>
    </div>

    <!-- 실수 패턴 -->
    <div class="chart-section">
      <h2>실수 패턴</h2>
      <div class="bar-chart" id="error-chart">
        ${data.errorPatterns
          .sort((a, b) => b.count - a.count)
          .map(e => `
            <div class="bar-row">
              <span class="bar-label">${e.category}</span>
              <div class="bar-track">
                <div class="bar-fill ${e.severity}" style="width: ${(e.count / maxCount) * 100}%">${e.count}</div>
              </div>
            </div>
          `).join('')}
      </div>
    </div>

    <!-- 연습문제 성적 -->
    <div class="chart-section">
      <h2>연습문제 성적</h2>
      ${data.exercises.length > 0 ? renderStackChart(data.exercises) : '<p style="color:var(--text-dim);font-size:0.9em;">아직 연습문제 데이터가 없습니다.</p>'}
    </div>

    <!-- 최근 피드백 -->
    <div class="feedback-section">
      <h2>최근 피드백</h2>
      ${data.feedback.map(f => `
        <div class="feedback-item">
          <div class="feedback-date">${f.date}</div>
          <div class="feedback-text">${f.text}</div>
        </div>
      `).join('')}
    </div>
  `;

  renderCalendar();
}

function renderCalendar() {
  const data = STUDY_DATA[currentTab];
  const today = new Date(2026, 2, 24);
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();

  const lessonDates = new Set(data.lessons.map(l => l.date));
  const exerciseDates = new Set(data.exercises.map(e => e.date));

  document.getElementById('cal-month-label').textContent =
    `${year}년 ${month + 1}월`;

  const grid = document.getElementById('cal-grid');
  const days = ['월', '화', '수', '목', '금', '토', '일'];
  let html = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  const firstDay = new Date(year, month, 1);
  let startDay = firstDay.getDay() - 1;
  if (startDay < 0) startDay = 6;

  for (let i = 0; i < startDay; i++) {
    html += '<div class="cal-cell empty"></div>';
  }

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isLesson = lessonDates.has(ds);
    const isExercise = exerciseDates.has(ds);
    const isToday = ds === today.toISOString().slice(0, 10);

    let cls = 'cal-cell';
    if (isLesson && isExercise) cls += ' both';
    else if (isLesson) cls += ' lesson';
    else if (isExercise) cls += ' exercise';
    if (isToday) cls += ' today';

    html += `<div class="${cls}">${d}</div>`;
  }

  grid.innerHTML = html;
}

function navMonth(dir) {
  calendarMonth.setMonth(calendarMonth.getMonth() + dir);
  renderCalendar();
}

function renderStackChart(exercises) {
  const maxTotal = Math.max(...exercises.map(e => e.total));
  const barH = 120;

  return `
    <div class="stack-chart">
      ${exercises.map(e => {
        const correctH = (e.score / maxTotal) * barH;
        const almostH = (e.almost / maxTotal) * barH;
        const wrongH = (e.wrong / maxTotal) * barH;
        return `
          <div class="stack-col">
            <div class="stack-segment correct" style="height:${correctH}px">${e.score}</div>
            <div class="stack-segment almost" style="height:${almostH}px">${e.almost}</div>
            <div class="stack-segment wrong" style="height:${wrongH}px">${e.wrong}</div>
            <div class="stack-label">${e.date.slice(5)}<br>${e.score}/${e.total}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="stack-legend">
      <span class="leg-correct">정답</span>
      <span class="leg-almost">거의 정답</span>
      <span class="leg-wrong">오답</span>
    </div>
  `;
}

// 초기 렌더
render();
</script>
</body>
</html>
